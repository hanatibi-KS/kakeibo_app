<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <!-- スマホで正しい幅で表示するために必須 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>お小遣い帳 - 登録画面</title>

    <!-- === PWA設定（ホーム画面に追加してアプリのように使うため） === -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <!-- iPhone用 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="家計簿">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 1.2em 0.6em;
            /* 画面幅に合わせて文字サイズを自動調整（スマホで2行に折り返さないように） */
            font-size: clamp(1em, 4.2vw, 1.4em);
            white-space: nowrap;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 30px;
            gap: 30px;
            width: 100%;
            padding: 0 12px;
        }

        section {
            background: white;
            padding: 25px;
            /* 固定幅をやめ、画面幅に合わせて伸縮させる（スマホ対応） */
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            /* スマホで入力時に画面が拡大するのを防ぐ（16px以上が必要） */
            font-size: 16px;
            font-family: inherit;
        }

        /* iPhoneのSafariでは日付入力の中身が右寄りになってしまうため、左寄せに揃える */
        input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            text-align: left;
            /* 他の入力欄と高さを揃える */
            min-height: 45px;
            background: white;
        }

        input[type="date"]::-webkit-date-and-time-value {
            text-align: left;
            margin: 0;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            margin-left: auto;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #43a047;
        }

        .link-button {
            background: #2196F3;
            margin-top: 15px;
        }

        .link-button:hover {
            background: #1976D2;
        }

        /* === 今月のペース ダッシュボード === */
        .pace-card {
            background: linear-gradient(135deg, #ffffff, #f1f8f4);
        }

        .mascot {
            font-size: 3em;
            line-height: 1;
            margin: 4px 0;
        }

        .pace-message {
            font-size: 1.05em;
            font-weight: 600;
            color: #333;
            min-height: 1.4em;
            margin: 6px 0;
        }

        .pace-sub {
            font-size: 0.85em;
            color: #777;
            margin: 2px 0 12px;
        }

        .pace-bar {
            width: 100%;
            height: 16px;
            background: #e6e9ec;
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
        }

        .pace-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            background: #4CAF50;
            transition: width 0.5s ease, background 0.3s;
        }

        .pace-bar-caption {
            font-size: 0.8em;
            color: #888;
            margin-top: 6px;
        }

        /* === レシート読み取り === */
        .ocr-hint {
            font-size: 0.85em;
            color: #777;
            margin: 4px 0 10px;
        }

        /* ファイル選択ボタンを他のボタンと同じ見た目にする */
        .file-label {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #FF9800;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .file-label:hover {
            background: #F57C00;
        }

        #receiptInput {
            display: none;
        }

        #receiptPreview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
        }

        .ocr-bar {
            width: 100%;
            height: 8px;
            background: #e6e9ec;
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }

        #ocrBarFill {
            height: 100%;
            width: 0%;
            background: #FF9800;
            border-radius: 10px;
            transition: width 0.3s;
        }

        #ocrStatus {
            font-size: 0.85em;
            color: #777;
            margin: 4px 0;
        }

        .ocr-result {
            background: #fff8f0;
            border: 1px solid #ffe0b2;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            text-align: left;
        }

        .ocr-result h4 {
            margin: 0 0 8px;
            color: #e65100;
            font-size: 0.95em;
        }

        .ocr-found {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin: 8px 0;
        }

        .ocr-note {
            font-size: 0.78em;
            color: #999;
            line-height: 1.5;
        }

        .ocr-raw {
            font-size: 0.75em;
            color: #666;
            white-space: pre-wrap;
            word-break: break-all;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 8px;
            margin-top: 6px;
            max-height: 140px;
            overflow-y: auto;
            text-align: left;
        }

        .ocr-raw-toggle {
            font-size: 0.8em;
            color: #2196F3;
            cursor: pointer;
            margin-top: 8px;
        }

        /* === 満足度セレクター === */
        .satisfaction-label {
            font-size: 0.9em;
            color: #555;
            margin: 10px 0 4px;
        }

        .satisfaction-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 6px;
        }

        .sat-btn {
            width: auto;
            flex: 1;
            padding: 8px 0;
            background: #f0f0f0;
            color: #555;
            border: 2px solid transparent;
            margin: 0;
        }

        .sat-btn:hover {
            background: #e4e7ea;
        }

        .sat-btn.selected {
            background: #fff;
            border-color: #4CAF50;
            color: #2e7d32;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <header>家計簿サポートアプリ - 登録画面</header>
    <main>

        <!-- 今月のペース ダッシュボード -->
        <section class="pace-card">
            <h2>今月のペース</h2>
            <div class="mascot" id="mascot">🐱</div>
            <p class="pace-message" id="paceMessage"></p>
            <p class="pace-sub" id="paceSub"></p>
            <div class="pace-bar">
                <div class="pace-bar-fill" id="paceBarFill"></div>
            </div>
            <p class="pace-bar-caption" id="paceBarCaption"></p>
        </section>

        <!-- お小遣い（収入）登録 -->
        <section>
            <h2>今月のお小遣い登録</h2>
            <input type="number" id="allowanceInput" placeholder="お小遣い金額を入力（円）">
            <button id="saveAllowanceBtn">お小遣いを保存</button>
            <p id="allowanceDisplay"></p>
        </section>

        <!-- レシート読み取り（OCR） -->
        <section>
            <h2>レシートから登録</h2>
            <p class="ocr-hint">レシートを撮影すると、金額と日付を自動で読み取って下の入力欄に入れます</p>

            <label class="file-label" for="receiptInput">📷 レシートを撮影・選択</label>
            <input type="file" id="receiptInput" accept="image/*">

            <p class="ocr-note" style="margin-top:6px;">
                📌 <b>うまく読むコツ</b>：明るい場所で、影を作らず、レシートを平らに伸ばして真上から。
                <b>合計の周辺だけを大きく写す</b>と精度が上がります。
            </p>

            <img id="receiptPreview" alt="レシートのプレビュー" style="display:none;">

            <div id="ocrProgress" style="display:none;">
                <div class="ocr-bar">
                    <div id="ocrBarFill"></div>
                </div>
                <p id="ocrStatus"></p>
            </div>

            <div id="ocrResult" class="ocr-result" style="display:none;"></div>
        </section>

        <!-- 支出登録 -->
        <section>
            <h2>支出の登録</h2>

            <!-- 日付 -->
            <input type="date" id="dateInput" />

            <!-- 項目 -->
            <input type="text" id="item" placeholder="項目（例：昼食）">

            <!-- 金額 -->
            <input type="number" id="amount" placeholder="金額（円）">

            <!-- カテゴリ -->
            <select id="category">
                <option value="食費">食費</option>
                <option value="交通費">交通費</option>
                <option value="娯楽費">娯楽費</option>
                <option value="その他">その他</option>
            </select>

            <!-- 満足度（この支出は満足だった？） -->
            <p class="satisfaction-label">この支出の満足度は？</p>
            <div class="satisfaction-group" id="satisfactionGroup">
                <button type="button" class="sat-btn" data-value="good">◎ 満足</button>
                <button type="button" class="sat-btn selected" data-value="ok">○ 普通</button>
                <button type="button" class="sat-btn" data-value="bad">△ いまいち</button>
            </div>

            <button id="saveExpenseBtn">支出を保存</button>
            <p id="balanceDisplay"></p>
        </section>

        <!-- 保存画面へのリンク -->
        <section>
            <h2>確認画面へ</h2>
            <button class="link-button" onclick="location.href='list.html'">今月の明細を見る</button>
        </section>

    </main>

    <!-- Tesseract.js（レシートOCR用。サイズが大きいのでCDNから読み込む） -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>

    <!-- main.js を読み込む（同フォルダに置く） -->
    <script src="js/main.js"></script>
    <script src="js/ocr.js"></script>

    <!-- Service Worker を登録（オフライン動作を有効にする） -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js")
                    .catch(err => console.log("SW登録失敗:", err));
            });
        }
    </script>
</body>

</html>
